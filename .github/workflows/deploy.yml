
name: Build and Deploy FaltaPouco

on:
  push:
    branches: [ main ]
    paths:
      - 'build_faltapoco.py'
      - 'games_input.json'
      - 'events_input.json'
      - 'import_partner_preview.py'
      - 'requirements.txt'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FALTAPOCO_INPUT: games_input.json
      FALTAPOCO_OUTPUT: site_build
      FALTAPOCO_BASE_URL: https://faltapoco.com.br
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install requests; fi

      - name: Build site
        run: |
          python build_faltapoco.py

      - name: Verify output
        run: |
          test -f site_build/index.html
          test -f site_build/sitemap.xml
          test -f site_build/robots.txt

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site_build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
